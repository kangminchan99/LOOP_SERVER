version: "3.8"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: loop
      POSTGRES_PASSWORD: loop1234
      POSTGRES_DB: loop_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - loop_network

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - loop_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - loop_network

volumes:
  postgres_data:
  redis_data:

networks:
  loop_network:
    driver: bridge
